    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#F5F6F8;--card:#FFFFFF;--surface:#EDEEF1;
      --teal:#22DBC8;--teal-deep:#3EA2A8;
      --teal-light:#E1FFFC;--teal-border:rgba(62,162,168,0.25);
      --teal-border-strong:rgba(62,162,168,0.5);
      --text:#111010;--muted:#686868;--border:#DADADA;--danger:#EF4444;
      --font:'MrEaves','Poppins',sans-serif;
    }
    html,body{min-height:100%;background:var(--bg);font-family:var(--font);color:var(--text);font-size:16px;line-height:24px;-webkit-text-size-adjust:100%;}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(103,234,221,0.08) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(34,219,200,0.05) 0%,transparent 50%);pointer-events:none;z-index:0;}
    .shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1.5rem 1.25rem 3rem;}

    /* ── Input card ── */
    .card{background:var(--card);border:1px solid var(--border);border-radius:1.25rem;width:100%;max-width:460px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);}
    .card-top{height:4px;background:linear-gradient(90deg,#67EADD 0%,#22DBC8 50%,#3EA2A8 100%);}
    .card-body{padding:1.75rem 1.75rem 1.5rem;}
    .card-footer{padding:0.75rem 1.75rem;border-top:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;}
    .footer-text{font-size:12px;color:var(--muted);}
    .footer-badge{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal-deep);background:var(--teal-light);border:1px solid var(--teal-border);border-radius:0.25rem;padding:0.2rem 0.5rem;}

    .logo-wrap{margin-bottom:1.5rem;}
    .logo-wrap img{height:22px;width:auto;display:block;}
    .pre-header{font-size:11px;letter-spacing:3.5px;text-transform:uppercase;color:var(--teal-deep);margin-bottom:0.35rem;}
    h1{font-size:clamp(26px,7vw,34px);line-height:1.1;font-weight:700;color:var(--text);margin-bottom:0.2rem;letter-spacing:-0.01em;}
    .subtitle{font-size:13px;color:var(--muted);margin-bottom:1.25rem;line-height:18px;}
    .divider{height:1px;background:var(--border);margin-bottom:1.25rem;}

    /* ── Fields ── */
    .field{margin-bottom:1rem;}
    label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem;}
    input[type="text"]{width:100%;background:#fff;border:1px solid var(--border);border-radius:0.625rem;padding:0.8rem 1rem;font-family:var(--font);font-size:16px;line-height:22px;color:var(--text);outline:none;transition:border-color 0.15s,box-shadow 0.15s;-webkit-appearance:none;appearance:none;touch-action:manipulation;}
    input[type="text"]:focus{border-color:var(--teal-border-strong);box-shadow:0 0 0 3px rgba(103,234,221,0.15);}
    input[type="text"]::placeholder{color:#C0C0C0;font-size:14px;}
    .field-hint{font-size:12px;color:var(--muted);margin-top:4px;line-height:16px;}

    /* ── Dates section ── */
    .dates-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem;}
    .dates-header-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
    .btn-add{background:none;border:1px solid var(--teal-border);border-radius:0.375rem;color:var(--teal-deep);font-family:var(--font);font-size:12px;font-weight:700;padding:0.3rem 0.75rem;cursor:pointer;letter-spacing:0.05em;transition:background 0.15s,border-color 0.15s;touch-action:manipulation;}
    .btn-add:hover{background:var(--teal-light);border-color:var(--teal-border-strong);}

    .date-list{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:0.4rem;}
    .date-row{display:flex;align-items:center;gap:0.5rem;}
    .date-row input[type="date"]{flex:1;min-width:0;background:#fff;border:1px solid var(--border);border-radius:0.625rem;padding:0.75rem 1rem;font-family:var(--font);font-size:16px;color:var(--text);outline:none;transition:border-color 0.15s,box-shadow 0.15s;-webkit-appearance:none;appearance:none;touch-action:manipulation;}
    .date-row input[type="date"]:focus{border-color:var(--teal-border-strong);box-shadow:0 0 0 3px rgba(103,234,221,0.15);}
    .btn-remove{width:38px;height:38px;flex-shrink:0;background:none;border:1px solid var(--border);border-radius:0.5rem;color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s,border-color 0.15s,color 0.15s;touch-action:manipulation;}
    .btn-remove:hover{background:#FEF2F2;border-color:rgba(239,68,68,0.3);color:var(--danger);}
    .btn-remove:disabled{opacity:0.25;cursor:not-allowed;pointer-events:none;}

    /* ── Generate button ── */
    .btn-generate{width:100%;background:linear-gradient(135deg,#67EADD 0%,#22DBC8 100%);border:none;border-radius:0.625rem;color:#111010;font-family:var(--font);font-size:17px;font-weight:700;padding:0.875rem 1.5rem;min-height:48px;cursor:pointer;margin-top:0.75rem;transition:opacity 0.15s,transform 0.1s;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
    .btn-generate:hover:not(:disabled){opacity:0.88;transform:translateY(-1px);}
    .btn-generate:active:not(:disabled){transform:scale(0.98);}
    .btn-generate:disabled{opacity:0.35;cursor:not-allowed;}

    /* ── QR output section ── */
    .qr-section{width:100%;max-width:460px;margin-top:1.75rem;display:none;}
    .qr-section.visible{display:block;}

    .qr-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;}
    .qr-section-title{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--teal-deep);}
    .qr-section-actions{display:flex;gap:0.5rem;}
    .btn-top-action{background:var(--card);border:1px solid var(--border);border-radius:0.5rem;color:var(--text);font-family:var(--font);font-size:13px;font-weight:700;padding:0.45rem 0.875rem;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:5px;touch-action:manipulation;white-space:nowrap;}
    .btn-top-action:hover{background:var(--surface);}
    .btn-top-action.primary{background:linear-gradient(135deg,#67EADD 0%,#22DBC8 100%);border:none;color:#111010;}
    .btn-top-action.primary:hover{opacity:0.88;}

    /* ── QR grid — 2 cols, single col on narrow ── */
    .qr-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem;}
    @media(max-width:380px){.qr-grid{grid-template-columns:1fr;}}

    /* ── Individual QR card ── */
    .qr-item{background:var(--card);border:1px solid var(--border);border-radius:1rem;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.06);}
    .qr-item-top{height:3px;background:linear-gradient(90deg,#67EADD,#22DBC8);}
    .qr-item-body{padding:1rem;display:flex;flex-direction:column;align-items:center;}
    .qr-item-day{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal-deep);margin-bottom:0.75rem;}
    .qr-wrap{background:#fff;border:1.5px solid var(--teal-border);border-radius:0.75rem;padding:0.75rem;display:inline-flex;margin-bottom:0.75rem;}
    .qr-wrap canvas,.qr-wrap img{display:block;}
    .qr-item-meta{width:100%;}
    .qr-item-meta-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:0.3rem 0;border-bottom:1px solid var(--border);}
    .qr-item-meta-row:last-child{border-bottom:none;}
    .qr-item-meta-label{color:var(--muted);}
    .qr-item-meta-val{font-weight:700;color:var(--text);font-size:12px;text-align:right;max-width:60%;word-break:break-all;}
    .qr-item-footer{padding:0.625rem 1rem;border-top:1px solid var(--border);background:var(--bg);}
    .btn-dl{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:0.5rem;color:var(--text);font-family:var(--font);font-size:13px;font-weight:700;padding:0.5rem;min-height:40px;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:5px;touch-action:manipulation;}
    .btn-dl:hover{background:var(--border);}

    @media print{
      body{background:white;}body::before{display:none;}
      .shell{padding:0;align-items:flex-start;}
      .card,.qr-section-header,.qr-item-footer{display:none!important;}
      .qr-section{display:block!important;margin:0;max-width:100%;}
      .qr-grid{grid-template-columns:repeat(2,1fr);gap:1.5rem;page-break-inside:avoid;}
      .qr-item{box-shadow:none;break-inside:avoid;}
      .qr-wrap{border-color:#ccc;}
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Input card -->
  <div class="card">
    <div class="card-top"></div>

      <p class="pre-header">Trainer Tools</p>
      <h1>Generate QR</h1>
      <p class="subtitle">Create check-in QR codes for your training session</p>
      <div class="divider"></div>

      <div class="field">
        <label>Session key</label>
        <input type="text" id="sessionKey" placeholder="e.g. ETT-123" autocomplete="off" autocapitalize="characters" oninput="onInput()"/>
        <div class="field-hint">Unique identifier for this training session</div>
      </div>

      <div class="field">
        <div class="dates-header">
          <span class="dates-header-label">Session dates</span>
          <button class="btn-add" onclick="addDate()">+ Add date</button>
        </div>
        <div class="date-list" id="dateList"></div>
        <div class="field-hint">One QR code will be generated per date</div>
      </div>

      <button class="btn-generate" id="generateBtn" onclick="generateAll()" disabled>
        Generate QR Codes
      </button>

    </div>
    <div class="card-footer">
      <span class="footer-text">Powered by Workato</span>
      <span class="footer-badge">Trainer</span>
    </div>
  </div>

  <!-- QR output -->
  <div class="qr-section" id="qrSection">
    <div class="qr-section-header">
      <span class="qr-section-title" id="sectionTitle">QR Codes</span>
      <div class="qr-section-actions">
        <button class="btn-top-action" onclick="downloadAll()">↓ All</button>
        <button class="btn-top-action primary" onclick="window.print()">🖨 Print</button>
      </div>
    </div>
    <div class="qr-grid" id="qrGrid"></div>
  </div>

</div>

<script>
  // ═══════════════════════════════════════════════════════════
  // ADMIN CONFIG
  // ═══════════════════════════════════════════════════════════
  const CHECKIN_BASE_URL = 'https://dennispham-workato.github.io/workato-checkin/attendance_checkin.html';
  // e.g. 'https://sites.google.com/view/your-org/checkin'
  // ═══════════════════════════════════════════════════════════

  let dateCount = 0;

  document.addEventListener('DOMContentLoaded', () => {
    addDate(new Date().toISOString().split('T')[0]);
  });

  function addDate(defaultVal) {
    dateCount++;
    const id  = 'date_' + dateCount;
    const row = document.createElement('div');
    row.className = 'date-row';
    row.id = 'row_' + id;

    const inp = document.createElement('input');
    inp.type  = 'date';
    inp.id    = id;
    inp.value = defaultVal || '';
    inp.addEventListener('input', onInput);

    const btn = document.createElement('button');
    btn.className = 'btn-remove';
    btn.title = 'Remove';
    btn.innerHTML = '✕';
    btn.addEventListener('click', () => { row.remove(); updateRemoveBtns(); onInput(); });

    row.appendChild(inp);
    row.appendChild(btn);
    document.getElementById('dateList').appendChild(row);
    updateRemoveBtns();
    onInput();
  }

  function updateRemoveBtns() {
    const btns = document.querySelectorAll('.btn-remove');
    btns.forEach(b => b.disabled = btns.length === 1);
  }

  function getDates() {
    return Array.from(document.querySelectorAll('.date-row input[type="date"]'))
      .map(i => i.value).filter(Boolean);
  }

  function onInput() {
    const key   = document.getElementById('sessionKey').value.trim();
    const dates = getDates();
    const btn   = document.getElementById('generateBtn');
    const valid = key && dates.length > 0;
    btn.disabled = !valid;
    if (valid) {
      const n = dates.length;
      btn.textContent = n === 1 ? 'Generate QR Code' : `Generate ${n} QR Codes`;
    } else {
      btn.textContent = 'Generate QR Codes';
    }
  }

  function fmt(dateStr) {
    const [y,m,d] = dateStr.split('-');
    return `${m}-${d}-${y}`;
  }

  function fmtDisplay(dateStr) {
    const [y,m,d] = dateStr.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m,10)-1]} ${parseInt(d,10)}, ${y}`;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function generateAll() {
    const key   = document.getElementById('sessionKey').value.trim();
    const dates = getDates();
    if (!key || !dates.length) return;

    const grid = document.getElementById('qrGrid');
    grid.innerHTML = '';

    dates.forEach((raw, i) => {
      const date    = fmt(raw);
      const display = fmtDisplay(raw);
      const url     = `${CHECKIN_BASE_URL}?key=${encodeURIComponent(key)}&session_date=${encodeURIComponent(date)}`;

      const item = document.createElement('div');
      item.className = 'qr-item';
      item.innerHTML = `
        <div class="qr-item-top"></div>
        <div class="qr-item-body">
          <div class="qr-item-day">Day ${i + 1}</div>
          <div class="qr-wrap"><div id="qr_${i}" style="width:140px;height:140px;"></div></div>
          <div class="qr-item-meta">
            <div class="qr-item-meta-row">
              <span class="qr-item-meta-label">Key</span>
              <span class="qr-item-meta-val">${esc(key)}</span>
            </div>
            <div class="qr-item-meta-row">
              <span class="qr-item-meta-label">Date</span>
              <span class="qr-item-meta-val">${esc(display)}</span>
            </div>
          </div>
        </div>
        <div class="qr-item-footer">
          <button class="btn-dl" onclick="downloadSingle(${i},'${esc(key)}','${date}')">↓ Download</button>
        </div>
      `;
      grid.appendChild(item);

      new QRCode(document.getElementById(`qr_${i}`), {
        text:         url,
        width:        140,
        height:       140,
        colorDark:    '#111010',
        colorLight:   '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    });

    document.getElementById('sectionTitle').textContent =
      `${key} — ${dates.length} QR Code${dates.length > 1 ? 's' : ''}`;

    const sec = document.getElementById('qrSection');
    sec.classList.add('visible');
    setTimeout(() => sec.scrollIntoView({behavior:'smooth', block:'start'}), 100);
  }

  function downloadSingle(index, key, date) {
    const container = document.getElementById('qr_' + index);
    if (!container) return;
    const el       = container.querySelector('canvas') || container.querySelector('img');
    if (!el) return;
    const filename = `qr_${key.replace(/[^a-zA-Z0-9-]/g,'_')}_${date}.png`;
    const link     = document.createElement('a');
    link.download  = filename;
    link.href      = el.tagName === 'CANVAS' ? el.toDataURL('image/png') : el.src;
    link.click();
  }

  function downloadAll() {
    const key   = document.getElementById('sessionKey').value.trim();
    const dates = getDates();
    dates.forEach((raw, i) => {
      setTimeout(() => downloadSingle(i, key, fmt(raw)), i * 350);
    });
  }
</script>
</body>
</html>
